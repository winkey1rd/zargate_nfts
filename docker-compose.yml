x-env: &env
  PYTHON_ENV: ${PYTHON_ENV:-dev}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *env
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
      - tma

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.${PYTHON_ENV:-dev}
      - api/.env.${PYTHON_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  fetcher:
    build:
      context: .
      dockerfile: fetcher/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.${PYTHON_ENV:-dev}
      - fetcher/.env.${PYTHON_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.${PYTHON_ENV:-dev}
      - bot/.env.${PYTHON_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy

  monitor:
    build:
      context: .
      dockerfile: monitor/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.${PYTHON_ENV:-dev}
      - monitor/.env.${PYTHON_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped

  tma:
    build:
      context: .
      dockerfile: tma/Dockerfile
    restart: unless-stopped

volumes:
  postgres_data: