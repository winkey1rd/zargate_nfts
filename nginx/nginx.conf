worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # IP rate limit — первый эшелон (до FastAPI)
    limit_req_zone $binary_remote_addr zone=by_ip:10m rate=10r/s;
    limit_req_status 429;

    upstream api      { server api:8000; }
    upstream frontend { server frontend:80; }
    upstream tma      { server tma:80; }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;

        ssl_certificate     /etc/letsencrypt/live/your.domain/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your.domain/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

        # IP rate limit применяется ко всем запросам
        limit_req zone=by_ip burst=20 nodelay;

        # REST API
        location /api/ {
            proxy_pass         http://api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # Telegram Mini App
        location /tma/ {
            proxy_pass http://tma;
        }

        # Web SPA (catch-all)
        location / {
            proxy_pass http://frontend;
        }
    }
}