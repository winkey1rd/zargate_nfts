services:
  postgres:
    ports:
      - "5432:5432"   # доступен с хоста для pgAdmin / psql

  redis:
    ports:
      - "6379:6379"   # доступен с хоста для redis-cli

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./api/app:/app/app          # hot reload — изменения без пересборки
      - ./shared/nft_shared:/shared/nft_shared
    command: >
      sh -c "uvicorn app.main:app
             --host ${API_HOST:-0.0.0.0}
             --port ${API_PORT:-8000}
             --reload"

  fetcher:
    volumes:
      - ./fetcher/app:/app/app
      - ./shared/nft_shared:/shared/nft_shared

  bot:
    volumes:
      - ./bot/app:/app/app
      - ./shared/nft_shared:/shared/nft_shared

  monitor:
    volumes:
      - ./monitor/app:/app/app
      - ./shared/nft_shared:/shared/nft_shared

  # В dev nginx не нужен — фронт и API доступны напрямую
  nginx:
    profiles:
      - prod-only